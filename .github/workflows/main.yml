name: Build APK

on:
  workflow_dispatch:
    inputs:
      spoofed_iccid:
        description: 'Spoofed ICCID (19-20 digits)'
        required: false
        default: '89860123456789012345'
      spoofed_imsi:
        description: 'Spoofed IMSI (15 digits)'
        required: false
        default: '310260123456789'
      spoofed_phone_number:
        description: 'Spoofed Phone Number (International format)'
        required: false
        default: '+1234567890'
  
  push:
    branches: [ main, master ]
  
  release:
    types: [ created ]

permissions:
  contents: write

# 添加环境变量强制使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    # 修复 setup-android 参数
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        # 使用 cmdline-tools 版本
        cmdline-tools-version: 'latest'
        # 自动接受许可证
        accept-android-sdk-licenses: true
        # 安装所需包：platform-tools, platforms;android-34, build-tools;34.0.0
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    
    # 可选：修改 SIM 值（如果手动触发）
    - name: Customize SIM values (if workflow_dispatch)
      if: github.event_name == 'workflow_dispatch'
      run: |
        # 注意：请根据实际的 Java 文件路径调整
        # 常见路径：app/src/main/java/com/k0rnhulio/simspoof/SimSpoofModule.java
        # 如果路径不对，请修改下面的 find 命令
        JAVA_FILE=$(find app/src -name "SimSpoofModule.java" | head -n 1)
        if [ -n "$JAVA_FILE" ]; then
          sed -i "s|private static final String SPOOFED_ICCID = \".*\"|private static final String SPOOFED_ICCID = \"${{ github.event.inputs.spoofed_iccid }}\"|" $JAVA_FILE
          sed -i "s|private static final String SPOOFED_IMSI = \".*\"|private static final String SPOOFED_IMSI = \"${{ github.event.inputs.spoofed_imsi }}\"|" $JAVA_FILE
          sed -i "s|private static final String SPOOFED_PHONE_NUMBER = \".*\"|private static final String SPOOFED_PHONE_NUMBER = \"${{ github.event.inputs.spoofed_phone_number }}\"|" $JAVA_FILE
        else
          echo "⚠️ Warning: SimSpoofModule.java not found, skipping value customization"
        fi
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    # 编译 Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
    
    # 列出生成的文件
    - name: List generated files
      run: |
        echo "=== APK files ==="
        find app/build/outputs/apk -name "*.apk" -ls
        echo "=== Directory listing ==="
        ls -la app/build/outputs/apk/release/ || ls -la app/build/outputs/apk/
    
    # 上传 APK 作为工作流制品
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimSpoof-Module
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/*/*.apk
        if-no-files-found: warn
    
    # 如果是 Release 触发，创建 GitHub Release
    - name: Create Release and Upload APK
      if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/*/*.apk
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## SIM Spoof Module APK
          
          自动编译的 Release 版本 APK。
          
          ### 构建信息
          - 构建时间: ${{ github.run_started_at }}
          - 提交: ${{ github.sha }}
          
          ### 使用方法
          1. 下载 APK 并安装到已 Root 设备
          2. 在 LSPosed 中启用模块
          3. 作用域选择 **系统框架 (android)**
          4. 重启设备
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
