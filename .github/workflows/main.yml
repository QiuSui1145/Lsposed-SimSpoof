name: Build APK

on:
  workflow_dispatch:
    inputs:
      spoofed_iccid:
        description: 'Spoofed ICCID (19-20 digits)'
        required: false
        default: '89860123456789012345'
      spoofed_imsi:
        description: 'Spoofed IMSI (15 digits)'
        required: false
        default: '310260123456789'
      spoofed_phone_number:
        description: 'Spoofed Phone Number (International format)'
        required: false
        default: '+1234567890'
  
  push:
    branches: [ main, master ]
  
  release:
    types: [ created ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 使用官方 Action 安装现代版 Gradle (8.5)，替代 apt-get
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 'latest'
        accept-android-sdk-licenses: true
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
    
    - name: Customize SIM values (if workflow_dispatch)
      if: github.event_name == 'workflow_dispatch'
      run: |
        JAVA_FILE=$(find app/src -name "SimSpoofModule.java" | head -n 1)
        if [ -n "$JAVA_FILE" ]; then
          echo "📝 Modifying: $JAVA_FILE"
          sed -i "s|private static final String SPOOFED_ICCID = \".*\"|private static final String SPOOFED_ICCID = \"${{ github.event.inputs.spoofed_iccid }}\"|" $JAVA_FILE
          sed -i "s|private static final String SPOOFED_IMSI = \".*\"|private static final String SPOOFED_IMSI = \"${{ github.event.inputs.spoofed_imsi }}\"|" $JAVA_FILE
          sed -i "s|private static final String SPOOFED_PHONE_NUMBER = \".*\"|private static final String SPOOFED_PHONE_NUMBER = \"${{ github.event.inputs.spoofed_phone_number }}\"|" $JAVA_FILE
        else
          echo "⚠️ Warning: SimSpoofModule.java not found, skipping value customization"
        fi
    
    - name: Build APK
      run: |
        # 优先使用 gradlew，如果没有则使用 setup-gradle 提供的系统 gradle
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
        elif [ -f "app/gradlew" ]; then
          cd app
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        else
          echo "🚀 Using system gradle (version 8.5) to build..."
          gradle assembleRelease --no-daemon
        fi
    
    - name: List generated files
      run: |
        echo "=== APK files ==="
        find . -name "*.apk" -ls 2>/dev/null
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimSpoof-Module
        path: |
          **/build/outputs/apk/**/*.apk
        if-no-files-found: warn
    
    - name: Create Release and Upload APK
      if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/build/outputs/apk/**/*.apk
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## SIM Spoof Module APK
          
          自动编译的 Release 版本 APK。
          
          ### 构建信息
          - 构建时间: ${{ github.run_started_at }}
          - 提交: ${{ github.sha }}
          
          ### 使用方法
          1. 下载 APK 并安装到已 Root 设备
          2. 在 LSPosed 中启用模块
          3. 作用域选择 **系统框架 (android)**
          4. 重启设备
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
